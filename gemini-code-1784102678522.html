<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Tactical Board Pro V12</title>

    <!-- PWA settings for Smartphone App Experience -->
    <meta name="apple-mobile-web-app-title" content="TacticalBoard">
    <meta name="application-name" content="TacticalBoard">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Header / Control Panel */
        header {
            background-color: #1e1e1e;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 10;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: #2a2a2a;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .group-label {
            font-size: 11px;
            color: #aaa;
            margin-right: 4px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button {
            background-color: #3a3a3a;
            color: white;
            border: 1px solid #555;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:active {
            background-color: #555;
        }

        button.active {
            background-color: #0076ff;
            border-color: #00c6ff;
        }

        /* Sliders */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #ccc;
        }
        .slider-container input[type="range"] {
            width: 70px;
            accent-color: #0076ff;
            cursor: pointer;
        }

        /* Color Picker Buttons */
        .color-picker {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #555;
            cursor: pointer;
            padding: 0;
        }
        .color-picker.active {
            border-color: #fff;
            box-shadow: 0 0 6px #fff;
        }

        /* Main Stage Wrapper */
        #stage-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        /* Responsive Container */
        #container {
            position: relative;
            background-color: #9bee60 !important;
            border: 4px solid #222;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: block;
        }

        /* Court Lines Background */
        #court-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #9bee60;
            z-index: 1;
            pointer-events: none;
            padding: 5%;
        }

        .court-border {
            width: 100%;
            height: 100%;
            border: 3px solid #ffffff;
            position: relative;
            box-sizing: border-box;
        }

        /* Brick Mark (X) */
        .brick-mark {
            position: absolute;
            width: 16px;
            height: 16px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .brick-mark::before, .brick-mark::after {
            content: '';
            position: absolute;
            background: #ffffff;
        }
        .brick-mark::before {
            top: 0; left: 7px; width: 2px; height: 16px;
            transform: rotate(45deg);
        }
        .brick-mark::after {
            top: 0; left: 7px; width: 2px; height: 16px;
            transform: rotate(-45deg);
        }

        /* Goal Lines & Halfway Line */
        .ez-line-top {
            position: absolute;
            left: 0;
            width: 100%;
            border-bottom: 3px solid #ffffff;
        }
        .ez-line-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            border-top: 3px solid #ffffff;
        }

        /* Transparent Draw Canvas */
        #drawingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: transparent !important;
            pointer-events: none;
        }
        #drawingCanvas.active {
            pointer-events: auto;
            cursor: crosshair;
        }

        /* Pieces & Disc */
        .piece {
            position: absolute;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            touch-action: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            user-select: none;
            -webkit-user-select: none;
            transition: width 0.1s, height 0.1s;
        }

        .piece.selected {
            outline: 3px solid #ffeb3b !important;
            outline-offset: 3px;
            box-shadow: 0 0 15px #ffeb3b;
        }

        .friend {
            width: 36px; height: 36px;
            background: #0055ff !important;
            border: 2px solid #ffffff; color: white; border-radius: 6px; font-size: 14px;
        }

        .enemy {
            width: 36px; height: 36px;
            background: #ff3333 !important;
            border: 2px solid #ffffff; color: white; border-radius: 6px; font-size: 14px;
        }

        .disk {
            width: 28px; height: 28px;
            background: #ffffff !important; border: 2px solid #000000;
            border-radius: 50%; color: #000000; font-size: 14px; z-index: 6;
        }

        /* Coverage Range Circles */
        .defense-circle {
            position: absolute; border-radius: 50%; pointer-events: none; z-index: 4; display: none;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .friend .defense-circle {
            background-color: rgba(0, 240, 255, 0.18) !important;
            border: 2px dashed rgba(0, 240, 255, 0.75) !important;
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }

        .enemy .defense-circle {
            background-color: rgba(255, 51, 51, 0.18) !important;
            border: 2px dashed rgba(255, 80, 80, 0.75) !important;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.3);
        }

        .hide-number {
            color: transparent !important;
        }

        /* Save Modal Popup */
        #saveModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center;
            flex-direction: column; padding: 20px;
        }
        #saveModal img {
            max-width: 90%; max-height: 70%; border: 2px solid #555;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); background: #9bee60;
        }
        #saveModal p { margin: 15px 0; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <!-- Court Type Selection -->
        <div class="control-group">
            <span class="group-label">Court</span>
            <button id="btnPlain">Plain</button>
            <button id="btnFull" class="active">Full</button>
            <button id="btnHalf">Endzone</button>
        </div>

        <!-- Aspect Ratio Selection -->
        <div class="control-group">
            <span class="group-label">Aspect</span>
            <button id="btnAspectAuto" class="active">Auto</button>
            <button id="btnAspectPortrait">Portrait</button>
            <button id="btnAspectLandscape">Landscape</button>
        </div>

        <!-- Multi-select Controls -->
        <div class="control-group">
            <span class="group-label">Select</span>
            <button id="btnMultiSelectMode">Multi-Select: OFF</button>
            <button id="btnSelectAll">Select All</button>
            <button id="btnClearSelection" style="padding: 6px 8px;">Clear</button>
        </div>

        <!-- Size & Circle Range Sliders -->
        <div class="control-group">
            <span class="group-label">Adjust</span>
            <div class="slider-container">
                <span>Player Size:</span>
                <input type="range" id="sliderSize" min="20" max="60" value="36">
            </div>
            <div class="slider-container">
                <span>Circle:</span>
                <button id="btnToggleCircle" style="padding: 3px 6px; font-size: 10px;">OFF</button>
                <input type="range" id="sliderCircle" min="40" max="250" value="100">
            </div>
        </div>

        <!-- Drawing, Erasing & Text Tools -->
        <div class="control-group">
            <span class="group-label">Draw</span>
            <button id="btnDrawMode">Pen</button>
            <button id="btnTextMode">Text</button> 
            <button class="color-picker active" id="color1" style="background: #000000;"></button> 
            <button class="color-picker" id="color2" style="background: #0055ff;"></button> 
            <button class="color-picker" id="color3" style="background: #ff3333;"></button> 
            <button id="btnEraserMode" style="background-color: #555;">Eraser</button> 
            <button id="btnClearLines" style="background-color: #8b0000; border-color: #a00;">Erase All</button> 
        </div>

        <!-- Preset Formations -->
        <div class="control-group">
            <span class="group-label">Formation</span>
            <button id="btnVert">Vert Stack</button>
            <button id="btnHoriz">Horiz Stack</button>
            <button id="btnHex">Hex</button>
        </div>

        <!-- Utilities -->
        <div class="control-group">
            <button id="btnToggleNum" class="active">Numbers: ON</button>
            <button id="btnReset">Reset Pieces</button>
            <button id="btnSave" style="background-color: #28a745; border-color: #218838;">Save Image</button>
        </div>
    </header>

    <div id="stage-wrapper">
        <div id="container">
            <div id="court-background">
                <div class="court-border" id="court-inner"></div>
            </div>
            <canvas id="drawingCanvas"></canvas>
        </div>
    </div>

    <!-- Save Modal Popup -->
    <div id="saveModal">
        <p>Long-press or right-click the image to save it to your device.</p>
        <img id="savePreview" src="" alt="Tactical Board Preview">
        <button id="btnCloseModal" style="background-color: #333; padding: 10px 20px;">Close</button>
    </div>

    <script>
        const stageWrapper = document.getElementById('stage-wrapper');
        const container = document.getElementById('container');
        const courtInner = document.getElementById('court-inner');
        const drawingCanvas = document.getElementById('drawingCanvas');
        const dctx = drawingCanvas.getContext('2d');

        let currentField = 'full'; 
        let isDrawingMode = false;
        let isEraserMode = false; 
        let isTextMode = false; 
        let isDrawing = false;
        let drawColor = '#000000'; 
        let showNumbers = true;
        let aspectMode = 'auto';

        let strokeHistory = []; 
        let textHistory = [];   
        
        let isMultiSelectMode = false;
        let selectedPieces = new Set();

        let pieceSize = 36; 
        let isCircleVisible = false;
        let circleRadius = 100; 

        // Size adjustment
        function adjustSize() {
            const wrapperW = stageWrapper.clientWidth;
            const wrapperH = stageWrapper.clientHeight;
            
            let isLandscape = false;
            if (aspectMode === 'landscape') {
                isLandscape = true;
            } else if (aspectMode === 'portrait') {
                isLandscape = false;
            } else {
                isLandscape = wrapperW > wrapperH;
            }

            let ratio = isLandscape ? (100 / 37) : (37 / 100);
            if (currentField === 'half') {
                ratio = isLandscape ? (1.1 / 1) : (1 / 1.1); 
            }

            let targetW = wrapperW;
            let targetH = wrapperW / ratio;

            if (targetH > wrapperH) {
                targetH = wrapperH;
                targetW = wrapperH * ratio;
            }

            container.style.width = `${targetW}px`;
            container.style.height = `${targetH}px`;

            drawingCanvas.width = targetW;
            drawingCanvas.height = targetH;

            renderCSSCourt(isLandscape);
            redrawSavedLines();
            positionAllPieces();
        }

        function renderCSSCourt(isLandscape) {
            courtInner.innerHTML = ''; 
            courtInner.style.border = '3px solid #ffffff';

            if (currentField === 'plain') return;

            if (currentField === 'full') {
                if (!isLandscape) {
                    const topEz = document.createElement('div'); topEz.className = 'ez-line-top'; topEz.style.top = '18%'; courtInner.appendChild(topEz);
                    const bottomEz = document.createElement('div'); bottomEz.className = 'ez-line-bottom'; bottomEz.style.bottom = '18%'; courtInner.appendChild(bottomEz);
                    createBrickMark('50%', '36%'); createBrickMark('50%', '64%');
                } else {
                    const leftEz = document.createElement('div'); leftEz.style.position = 'absolute'; leftEz.style.top = '0'; leftEz.style.left = '18%'; leftEz.style.height = '100%'; leftEz.style.borderRight = '3px solid #ffffff'; courtInner.appendChild(leftEz);
                    const rightEz = document.createElement('div'); rightEz.style.position = 'absolute'; rightEz.style.top = '0'; rightEz.style.right = '18%'; rightEz.style.height = '100%'; rightEz.style.borderLeft = '3px solid #ffffff'; courtInner.appendChild(rightEz);
                    createBrickMark('36%', '50%'); createBrickMark('64%', '50%');
                }
            } else if (currentField === 'half') {
                if (!isLandscape) {
                    const ezLine = document.createElement('div'); ezLine.className = 'ez-line-top'; ezLine.style.top = '45%'; courtInner.appendChild(ezLine);
                    createBrickMark('50%', '90%');
                } else {
                    const ezLine = document.createElement('div'); ezLine.style.position = 'absolute'; ezLine.style.top = '0'; ezLine.style.right = '45%'; ezLine.style.height = '100%'; ezLine.style.borderLeft = '3px solid #ffffff'; courtInner.appendChild(ezLine);
                    createBrickMark('10%', '50%');
                }
            }
        }

        function createBrickMark(left, top) {
            const mark = document.createElement('div');
            mark.className = 'brick-mark'; mark.style.left = left; mark.style.top = top;
            courtInner.appendChild(mark);
        }

        // Pieces management
        const pieces = [];

        function createPiece(id, type, label, xPercent, yPercent) {
            const div = document.createElement('div');
            div.className = `piece ${type}`; div.id = id;
            
            const labelSpan = document.createElement('span');
            labelSpan.innerText = label; div.appendChild(labelSpan);

            div.dataset.xPercent = xPercent; div.dataset.yPercent = yPercent;

            if (type !== 'disk') {
                const circle = document.createElement('div');
                circle.className = 'defense-circle'; div.appendChild(circle);
            }

            container.appendChild(div); pieces.push(div);
            
            let isDraggingPiece = false;
            let startPointer = { x: 0, y: 0 };
            let startCoords = [];

            div.addEventListener('pointerdown', (e) => {
                if (isDrawingMode || isEraserMode || isTextMode) return; 

                if (isMultiSelectMode && type !== 'disk') {
                    if (selectedPieces.has(div)) {
                        selectedPieces.delete(div); div.classList.remove('selected');
                    } else {
                        selectedPieces.add(div); div.classList.add('selected');
                    }
                    e.stopPropagation(); return;
                }

                isDraggingPiece = true; div.style.zIndex = 10; 
                startPointer.x = e.clientX; startPointer.y = e.clientY;

                startCoords = [];
                if (selectedPieces.has(div)) {
                    selectedPieces.forEach(p => {
                        const rect = p.getBoundingClientRect(); const containerRect = container.getBoundingClientRect();
                        startCoords.push({ element: p, left: rect.left - containerRect.left, top: rect.top - containerRect.top });
                        p.style.zIndex = 9;
                    });
                    div.style.zIndex = 10;
                } else {
                    const rect = div.getBoundingClientRect(); const containerRect = container.getBoundingClientRect();
                    startCoords.push({ element: div, left: rect.left - containerRect.left, top: rect.top - containerRect.top });
                }
                div.setPointerCapture(e.pointerId); e.stopPropagation();
            });

            div.addEventListener('pointermove', (e) => {
                if (!isDraggingPiece) return;
                const containerRect = container.getBoundingClientRect();
                const deltaX = e.clientX - startPointer.x; const deltaY = e.clientY - startPointer.y;

                startCoords.forEach(coord => {
                    let newLeft = coord.left + deltaX; let newTop = coord.top + deltaY;
                    newLeft = Math.max(0, Math.min(newLeft, containerRect.width - coord.element.offsetWidth));
                    newTop = Math.max(0, Math.min(newTop, containerRect.height - coord.element.offsetHeight));
                    coord.element.style.left = newLeft + 'px'; coord.element.style.top = newTop + 'px';
                    coord.element.dataset.xPercent = (newLeft / containerRect.width) * 100;
                    coord.element.dataset.yPercent = (newTop / containerRect.height) * 100;
                });
            });

            div.addEventListener('pointerup', (e) => {
                if (!isDraggingPiece) return;
                isDraggingPiece = false;
                startCoords.forEach(coord => { coord.element.style.zIndex = (coord.element.classList.contains('disk')) ? 6 : 5; });
                div.releasePointerCapture(e.pointerId);
            });
        }

        function initPieces() {
            pieces.forEach(p => p.remove()); pieces.length = 0; selectedPieces.clear();
            for(let i = 1; i <= 7; i++) { createPiece(`f${i}`, 'friend', i.toString(), 15 + (i * 8), 75); }
            for(let i = 1; i <= 7; i++) { createPiece(`e${i}`, 'enemy', i.toString(), 15 + (i * 8), 25); }
            createPiece('disk', 'disk', '★', 50, 50);
            applyPieceSize(); applyCircleSettings(); positionAllPieces();
        }

        function positionAllPieces() {
            const w = container.clientWidth; const h = container.clientHeight;
            if (w === 0 || h === 0) return;
            pieces.forEach(p => {
                p.style.left = `calc(${p.dataset.xPercent}% - ${p.offsetWidth / 2}px)`;
                p.style.top = `calc(${p.dataset.yPercent}% - ${p.offsetHeight / 2}px)`;
            });
        }

        function applyPieceSize() {
            pieces.forEach(p => {
                let factor = (p.id === 'disk') ? 0.8 : 1.0;
                p.style.width = `${pieceSize * factor}px`; p.style.height = `${pieceSize * factor}px`;
                p.style.fontSize = `${pieceSize * (p.id === 'disk' ? 0.4 : 0.38)}px`;
            });
            positionAllPieces();
        }

        function applyCircleSettings() {
            pieces.forEach(p => {
                const circle = p.querySelector('.defense-circle');
                if (circle) {
                    circle.style.display = isCircleVisible ? 'block' : 'none';
                    circle.style.width = `${circleRadius}px`; circle.style.height = `${circleRadius}px`;
                }
            });
        }

        function setFormation(type) {
            const isLandscape = container.clientWidth > container.clientHeight;
            let fCoords = []; let eCoords = []; let dCoord = {x: 50, y: 50};

            if (!isLandscape) {
                if (type === 'vertical') {
                    fCoords = [ {x: 40, y: 75}, {x: 60, y: 75}, {x: 50, y: 55}, {x: 50, y: 46}, {x: 50, y: 37}, {x: 50, y: 28}, {x: 50, y: 19} ];
                    eCoords = fCoords.map(c => ({x: c.x, y: c.y - 2.5})); dCoord = {x: 37, y: 75};
                } else if (type === 'horizontal') {
                    fCoords = [ {x: 25, y: 75}, {x: 50, y: 75}, {x: 75, y: 75}, {x: 20, y: 45}, {x: 40, y: 45}, {x: 60, y: 45}, {x: 80, y: 45} ];
                    eCoords = fCoords.map(c => ({x: c.x, y: c.y - 5})); dCoord = {x: 50, y: 78};
                } else if (type === 'hex') {
                    fCoords = [ {x: 50, y: 50}, {x: 50, y: 30}, {x: 75, y: 40}, {x: 75, y: 60}, {x: 50, y: 70}, {x: 25, y: 60}, {x: 25, y: 40} ];
                    eCoords = fCoords.map(c => ({x: c.x - 4, y: c.y - 4})); dCoord = {x: 50, y: 66};
                }
            } else {
                if (type === 'vertical') {
                    fCoords = [ {x: 25, y: 40}, {x: 25, y: 60}, {x: 45, y: 50}, {x: 54, y: 50}, {x: 63, y: 50}, {x: 72, y: 50}, {x: 81, y: 50} ];
                    eCoords = fCoords.map(c => ({x: c.x + 2.5, y: c.y})); dCoord = {x: 25, y: 34};
                } else if (type === 'horizontal') {
                    fCoords = [ {x: 25, y: 25}, {x: 25, y: 50}, {x: 25, y: 75}, {x: 55, y: 20}, {x: 55, y: 40}, {x: 55, y: 60}, {x: 55, y: 80} ];
                    eCoords = fCoords.map(c => ({x: c.x + 5, y: c.y})); dCoord = {x: 22, y: 50};
                } else if (type === 'hex') {
                    fCoords = [ {x: 50, y: 50}, {x: 70, y: 50}, {x: 60, y: 25}, {x: 40, y: 25}, {x: 30, y: 50}, {x: 40, y: 75}, {x: 60, y: 75} ];
                    eCoords = fCoords.map(c => ({x: c.x + 4, y: c.y - 4})); dCoord = {x: 34, y: 50};
                }
            }

            for (let i = 0; i < 7; i++) {
                document.getElementById(`f${i+1}`).dataset.xPercent = fCoords[i].x; document.getElementById(`f${i+1}`).dataset.yPercent = fCoords[i].y;
                document.getElementById(`e${i+1}`).dataset.xPercent = eCoords[i].x; document.getElementById(`e${i+1}`).dataset.yPercent = eCoords[i].y;
            }
            document.getElementById('disk').dataset.xPercent = dCoord.x; document.getElementById('disk').dataset.yPercent = dCoord.y;
            positionAllPieces();
        }

        // --- Drawing, Erasing & Text Logic ---
        function handleDrawingPointer(e) {
            const rect = drawingCanvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            const xp = (x / rect.width) * 100;
            const yp = (y / rect.height) * 100;

            if (isEraserMode) {
                strokeHistory = strokeHistory.filter(stroke => {
                    stroke.points = stroke.points.filter(pt => Math.hypot(pt.xPercent - xp, pt.yPercent - yp) > 2.0); 
                    return stroke.points.length >= 2;
                });
                textHistory = textHistory.filter(txt => Math.hypot(txt.xPercent - xp, txt.yPercent - yp) > 4.0);
                redrawSavedLines();
            } else if (isDrawingMode && currentStroke) {
                currentStroke.points.push({ xPercent: xp, yPercent: yp });
                dctx.lineTo(x, y);
                dctx.strokeStyle = drawColor; dctx.lineWidth = 4; dctx.lineCap = 'round'; dctx.lineJoin = 'round';
                dctx.stroke();
            }
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = drawingCanvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            const xp = (x / rect.width) * 100;
            const yp = (y / rect.height) * 100;
            
            if (isTextMode) {
                const str = prompt("Enter text message:");
                if (str && str.trim() !== "") {
                    textHistory.push({ text: str.trim(), xPercent: xp, yPercent: yp, color: drawColor });
                    redrawSavedLines();
                }
                isDrawing = false;
            } else if (isEraserMode) {
                handleDrawingPointer(e);
            } else if (isDrawingMode) {
                currentStroke = { color: drawColor, points: [{ xPercent: xp, yPercent: yp }] };
                dctx.beginPath(); dctx.moveTo(x, y);
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            handleDrawingPointer(e);
        }

        function stopDrawing() {
            if (isDrawing && currentStroke && !isEraserMode) strokeHistory.push(currentStroke);
            isDrawing = false; currentStroke = null;
        }

        function redrawSavedLines() {
            const w = drawingCanvas.width; const h = drawingCanvas.height;
            dctx.clearRect(0, 0, w, h);

            strokeHistory.forEach(stroke => {
                if (stroke.points.length < 2) return;
                dctx.beginPath();
                dctx.moveTo((stroke.points[0].xPercent / 100) * w, (stroke.points[0].yPercent / 100) * h);
                for (let i = 1; i < stroke.points.length; i++) {
                    dctx.lineTo((stroke.points[i].xPercent / 100) * w, (stroke.points[i].yPercent / 100) * h);
                }
                dctx.strokeStyle = stroke.color; dctx.lineWidth = 4; dctx.lineCap = 'round'; dctx.lineJoin = 'round'; dctx.stroke();
            });

            textHistory.forEach(txt => {
                dctx.fillStyle = txt.color; dctx.font = "bold 13px sans-serif"; dctx.textAlign = "center"; dctx.textBaseline = "middle";
                dctx.strokeStyle = "#ffffff"; dctx.lineWidth = 2.5;
                dctx.strokeText(txt.text, (txt.xPercent / 100) * w, (txt.yPercent / 100) * h);
                dctx.fillText(txt.text, (txt.xPercent / 100) * w, (txt.yPercent / 100) * h);
            });
        }

        // --- Controls Event Listeners ---
        document.getElementById('btnPlain').addEventListener('click', () => { currentField = 'plain'; setActiveButton('field', 'btnPlain'); adjustSize(); });
        document.getElementById('btnFull').addEventListener('click', () => { currentField = 'full'; setActiveButton('field', 'btnFull'); adjustSize(); });
        document.getElementById('btnHalf').addEventListener('click', () => { currentField = 'half'; setActiveButton('field', 'btnHalf'); adjustSize(); });

        document.getElementById('btnAspectAuto').addEventListener('click', () => { aspectMode = 'auto'; setActiveButton('aspect', 'btnAspectAuto'); adjustSize(); });
        document.getElementById('btnAspectPortrait').addEventListener('click', () => { aspectMode = 'portrait'; setActiveButton('aspect', 'btnAspectPortrait'); adjustSize(); });
        document.getElementById('btnAspectLandscape').addEventListener('click', () => { aspectMode = 'landscape'; setActiveButton('aspect', 'btnAspectLandscape'); adjustSize(); });

        function setActiveButton(group, activeId) {
            let ids = (group === 'field') ? ['btnPlain', 'btnFull', 'btnHalf'] : ['btnAspectAuto', 'btnAspectPortrait', 'btnAspectLandscape'];
            ids.forEach(id => document.getElementById(id).classList.toggle('active', id === activeId));
        }

        const btnMultiSelectMode = document.getElementById('btnMultiSelectMode');
        btnMultiSelectMode.addEventListener('click', () => {
            isMultiSelectMode = !isMultiSelectMode; btnMultiSelectMode.innerText = isMultiSelectMode ? 'Multi-Select: ON' : 'Multi-Select: OFF';
            btnMultiSelectMode.classList.toggle('active', isMultiSelectMode);
        });

        document.getElementById('btnSelectAll').addEventListener('click', () => {
            if (!isMultiSelectMode) { isMultiSelectMode = true; btnMultiSelectMode.innerText = 'Multi-Select: ON'; btnMultiSelectMode.classList.add('active'); }
            pieces.forEach(p => { if (p.id !== 'disk') { selectedPieces.add(p); p.classList.add('selected'); } });
        });

        document.getElementById('btnClearSelection').addEventListener('click', () => {
            selectedPieces.forEach(p => p.classList.remove('selected')); selectedPieces.clear();
        });

        document.getElementById('sliderSize').addEventListener('input', (e) => { pieceSize = parseInt(e.target.value); applyPieceSize(); });

        const btnToggleCircle = document.getElementById('btnToggleCircle');
        btnToggleCircle.addEventListener('click', () => {
            isCircleVisible = !isCircleVisible; btnToggleCircle.innerText = isCircleVisible ? 'ON' : 'OFF';
            btnToggleCircle.classList.toggle('active', isCircleVisible); applyCircleSettings();
        });

        document.getElementById('sliderCircle').addEventListener('input', (e) => { circleRadius = parseInt(e.target.value); applyCircleSettings(); });

        const btnDrawMode = document.getElementById('btnDrawMode');
        const btnTextMode = document.getElementById('btnTextMode');
        const btnEraserMode = document.getElementById('btnEraserMode');

        function toggleDrawTools(mode) {
            isDrawingMode = (mode === 'draw'); isTextMode = (mode === 'text'); isEraserMode = (mode === 'erase');
            btnDrawMode.classList.toggle('active', isDrawingMode);
            btnTextMode.classList.toggle('active', isTextMode);
            btnEraserMode.classList.toggle('active', isEraserMode);
            drawingCanvas.classList.toggle('active', isDrawingMode || isTextMode || isEraserMode);
        }

        btnDrawMode.addEventListener('click', () => toggleDrawTools(isDrawingMode ? 'none' : 'draw'));
        btnTextMode.addEventListener('click', () => toggleDrawTools(isTextMode ? 'none' : 'text'));
        btnEraserMode.addEventListener('click', () => toggleDrawTools(isEraserMode ? 'none' : 'erase'));

        const colors = [{ id: 'color1', val: '#000000' }, { id: 'color2', val: '#0055ff' }, { id: 'color3', val: '#ff3333' }];
        colors.forEach(item => {
            document.getElementById(item.id).addEventListener('click', () => {
                drawColor = item.val; 
                if(!isTextMode) toggleDrawTools('draw'); 
                colors.forEach(c => document.getElementById(c.id).classList.toggle('active', c.id === item.id));
            });
        });

        document.getElementById('btnClearLines').addEventListener('click', () => {
            strokeHistory = []; textHistory = []; dctx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
        });

        const btnToggleNum = document.getElementById('btnToggleNum');
        btnToggleNum.addEventListener('click', () => {
            showNumbers = !showNumbers; btnToggleNum.innerText = showNumbers ? 'Numbers: ON' : 'Numbers: OFF';
            btnToggleNum.classList.toggle('active', showNumbers);
            pieces.forEach(p => { if (p.id !== 'disk') { const span = p.querySelector('span'); if (span) span.classList.toggle('hide-number', !showNumbers); } });
        });

        document.getElementById('btnReset').addEventListener('click', () => { initPieces(); });
        document.getElementById('btnVert').addEventListener('click', () => setFormation('vertical'));
        document.getElementById('btnHoriz').addEventListener('click', () => setFormation('horizontal'));
        document.getElementById('btnHex').addEventListener('click', () => setFormation('hex'));

        drawingCanvas.addEventListener('mousedown', startDrawing);
        drawingCanvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        drawingCanvas.addEventListener('touchstart', (e) => { if (e.touches.length === 1) startDrawing(e); });
        drawingCanvas.addEventListener('touchmove', (e) => { if (e.touches.length === 1) { e.preventDefault(); draw(e); } });
        window.addEventListener('touchend', stopDrawing);

        // --- Export Image ---
        document.getElementById('btnSave').addEventListener('click', () => {
            const exportCanvas = document.createElement('canvas'); exportCanvas.width = drawingCanvas.width; exportCanvas.height = drawingCanvas.height;
            const ectx = exportCanvas.getContext('2d');

            ectx.fillStyle = '#9bee60'; ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            ectx.strokeStyle = '#ffffff'; ectx.lineWidth = 3;
            const padX = exportCanvas.width * 0.05; const padY = exportCanvas.height * 0.05;
            const cw = exportCanvas.width - (padX * 2); const ch = exportCanvas.height - (padY * 2);
            ectx.strokeRect(padX, padY, cw, ch);

            const isLandscape = exportCanvas.width > exportCanvas.height;
            if (currentField === 'full') {
                if (!isLandscape) {
                    const ezLength = ch * 0.18;
                    ectx.beginPath(); ectx.moveTo(padX, padY + ezLength); ectx.lineTo(padX + cw, padY + ezLength); ectx.stroke();
                    ectx.beginPath(); ectx.moveTo(padX, padY + ch - ezLength); ectx.lineTo(padX + cw, padY + ch - ezLength); ectx.stroke();
                } else {
                    const ezLength = cw * 0.18;
                    ectx.beginPath(); ectx.moveTo(padX + ezLength, padY); ectx.lineTo(padX + ezLength, padY + ch); ectx.stroke();
                    ectx.beginPath(); ectx.moveTo(padX + cw - ezLength, padY); ectx.lineTo(padX + cw - ezLength, padY + ch); ectx.stroke();
                }
            } else if (currentField === 'half') {
                if (!isLandscape) {
                    const ezLength = ch * 0.45; ectx.beginPath(); ectx.moveTo(padX, padY + ezLength); ectx.lineTo(padX + cw, padY + ezLength); ectx.stroke();
                } else {
                    const ezLength = cw * 0.45; ectx.beginPath(); ectx.moveTo(padX + cw - ezLength, padY); ectx.lineTo(padX + cw - ezLength, padY + ch); ectx.stroke();
                }
            }

            if (isCircleVisible) {
                pieces.forEach(p => {
                    if (p.id === 'disk') return;
                    const rect = p.getBoundingClientRect(); const containerRect = container.getBoundingClientRect();
                    const centerX = (rect.left - containerRect.left) + (rect.width / 2); const centerY = (rect.top - containerRect.top) + (rect.height / 2);
                    ectx.save(); ectx.beginPath(); ectx.arc(centerX, centerY, circleRadius / 2, 0, Math.PI * 2);
                    if (p.classList.contains('friend')) { ectx.fillStyle = 'rgba(0, 240, 255, 0.18)'; ectx.strokeStyle = 'rgba(0, 240, 255, 0.75)'; } 
                    else { ectx.fillStyle = 'rgba(255, 51, 51, 0.18)'; ectx.strokeStyle = 'rgba(255, 80, 80, 0.75)'; }
                    ectx.setLineDash([4, 4]); ectx.lineWidth = 2; ectx.fill(); ectx.stroke(); ectx.restore();
                });
            }

            ectx.drawImage(drawingCanvas, 0, 0);

            pieces.forEach(p => {
                const rect = p.getBoundingClientRect(); const containerRect = container.getBoundingClientRect();
                const x = rect.left - containerRect.left; const y = rect.top - containerRect.top; const size = rect.width;
                ectx.save();
                if (selectedPieces.has(p)) { ectx.strokeStyle = '#ffeb3b'; ectx.lineWidth = 3; ectx.strokeRect(x - 3, y - 3, size + 6, size + 6); }
                if (p.classList.contains('friend')) {
                    ectx.fillStyle = '#0055ff'; ectx.strokeStyle = '#ffffff'; ectx.lineWidth = 2; drawRoundRect(ectx, x, y, size, size, 6); ectx.fill(); ectx.stroke();
                    if (showNumbers) { ectx.fillStyle = '#ffffff'; ectx.font = `bold ${size * 0.4}px sans-serif`; ectx.textAlign = 'center'; ectx.textBaseline = 'middle'; ectx.fillText(p.innerText.trim(), x + size/2, y + size/2); }
                } else if (p.classList.contains('enemy')) {
                    ectx.fillStyle = '#ff3333'; ectx.strokeStyle = '#ffffff'; ectx.lineWidth = 2; drawRoundRect(ectx, x, y, size, size, 6); ectx.fill(); ectx.stroke();
                    if (showNumbers) { ectx.fillStyle = '#ffffff'; ectx.font = `bold ${size * 0.4}px sans-serif`; ectx.textAlign = 'center'; ectx.textBaseline = 'middle'; ectx.fillText(p.innerText.trim(), x + size/2, y + size/2); }
                } else if (p.classList.contains('disk')) {
                    ectx.fillStyle = '#ffffff'; ectx.strokeStyle = '#000000'; ectx.lineWidth = 2; ectx.beginPath(); ectx.arc(x + size/2, y + size/2, size/2 - 1, 0, Math.PI * 2); ectx.fill(); ectx.stroke();
                    ectx.fillStyle = '#000000'; ectx.font = `${size * 0.5}px sans-serif`; ectx.textAlign = 'center'; ectx.textBaseline = 'middle'; ectx.fillText('★', x + size/2, y + size/2);
                }
                ectx.restore();
            });

            try {
                document.getElementById('savePreview').src = exportCanvas.toDataURL('image/png');
                document.getElementById('saveModal').style.display = 'flex';
            } catch (e) {}
        });

        document.getElementById('btnCloseModal').addEventListener('click', () => { document.getElementById('saveModal').style.display = 'none'; });
        window.addEventListener('resize', adjustSize);
        window.addEventListener('DOMContentLoaded', () => { adjustSize(); initPieces(); });
    </script>
</body>
</html>
